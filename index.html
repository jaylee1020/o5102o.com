<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="o5102o — developer">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:title" content="o5102o">
  <meta property="og:description" content="developer">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://o5102o.com">
  <title>o5102o</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --dim: #3a3a3a;
      --mid: #555;
      --sub: #888;
      --line: #141414;
      --mono: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NAV ─────────────────────────────────────── */
    nav {
      padding: 1.25rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .nav-id {
      font-size: 0.6875rem;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav-status {
      font-size: 0.625rem;
      color: var(--dim);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-status::before {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #2a5a2a;
      box-shadow: 0 0 6px #2a5a2a;
    }

    /* ─── MAIN ────────────────────────────────────── */
    main {
      padding: 5rem 2.5rem 4rem;
      max-width: 860px;
    }

    /* Hero */
    .hero {
      margin-bottom: 5rem;
    }

    .handle {
      font-size: clamp(3.5rem, 12vw, 8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 0.9;
      color: var(--fg);
      margin-bottom: 1.5rem;
    }

    .tagline {
      font-size: 0.8125rem;
      color: var(--mid);
      letter-spacing: 0.06em;
    }

    /* ─── ABOUT ───────────────────────────────────── */
    .section {
      margin-bottom: 4rem;
    }

    .section-label {
      font-size: 0.625rem;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::after {
      content: "";
      display: block;
      height: 1px;
      width: 2rem;
      background: var(--line);
    }

    .bio {
      font-size: 0.875rem;
      color: var(--sub);
      line-height: 1.85;
      max-width: 520px;
    }

    .bio .highlight {
      color: var(--fg);
    }

    /* ─── LINKS ───────────────────────────────────── */
    .links {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .links li {
      border-top: 1px solid var(--line);
    }

    .links li:last-child {
      border-bottom: 1px solid var(--line);
    }

    .links a {
      display: grid;
      grid-template-columns: 7rem 1fr 1.5rem;
      align-items: center;
      padding: 0.9rem 0;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
    }

    .link-key {
      font-size: 0.625rem;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .link-val {
      font-size: 0.8125rem;
      color: var(--mid);
      transition: color 0.15s;
    }

    .links a:hover .link-val {
      color: var(--fg);
    }

    .link-arrow {
      font-size: 0.75rem;
      color: var(--dim);
      text-align: right;
      transition: color 0.15s, transform 0.15s;
    }

    .links a:hover .link-arrow {
      color: var(--sub);
      transform: translateX(2px);
    }

    /* ─── FOOTER ──────────────────────────────────── */
    footer {
      padding: 1.25rem 2.5rem;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      font-size: 0.5625rem;
      color: var(--dim);
      letter-spacing: 0.08em;
    }

    /* ─── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 600px) {
      nav, main, footer {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }

      main {
        padding-top: 3.5rem;
      }

      .handle {
        margin-bottom: 1.25rem;
      }

      .hero {
        margin-bottom: 3.5rem;
      }

      .links a {
        grid-template-columns: 5.5rem 1fr 1.25rem;
      }
    }

    /* ─── REDUCED MOTION ──────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }

    ::selection {
      background: #1e1e1e;
      color: var(--fg);
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-id">o5102o.com</span>
    <span class="nav-status">open to work</span>
  </nav>

  <main>

    <section class="hero">
      <h1 class="handle">o5102o</h1>
      <p class="tagline">developer</p>
    </section>

    <section class="section">
      <p class="section-label">about</p>
      <p class="bio">
        <span class="highlight">안녕하세요, 이주영(Jay)입니다.</span>
        컴퓨터공학부 2학년 재학 중.
        무언가를 만들고, 고민하고, 또 만듭니다.
      </p>
    </section>

    <section class="section">
      <p class="section-label">links</p>
      <ul class="links">
        <li>
          <a href="/by/">
            <span class="link-key">portfolio</span>
            <span class="link-val">by.o5102o.com</span>
            <span class="link-arrow">→</span>
          </a>
        </li>
        <li>
          <a href="/info/">
            <span class="link-key">card</span>
            <span class="link-val">info.o5102o.com</span>
            <span class="link-arrow">→</span>
          </a>
        </li>
        <li>
          <a href="https://github.com/jaylee1020" target="_blank" rel="noopener noreferrer">
            <span class="link-key">github</span>
            <span class="link-val">github.com/jaylee1020</span>
            <span class="link-arrow">→</span>
          </a>
        </li>
        <li>
          <a href="mailto:jyounglee1020@gmail.com">
            <span class="link-key">email</span>
            <span class="link-val">jyounglee1020@gmail.com</span>
            <span class="link-arrow">→</span>
          </a>
        </li>
        <li>
          <a href="https://www.instagram.com/o5102o" target="_blank" rel="noopener noreferrer">
            <span class="link-key">instagram</span>
            <span class="link-val">@o5102o</span>
            <span class="link-arrow">→</span>
          </a>
        </li>
      </ul>
    </section>

  </main>

  <footer>
    <span>© 2026 o5102o</span>
    <span>Seoul, KR</span>
  </footer>

</body>
</html>
