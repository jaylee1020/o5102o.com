<head>

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #1a1a1a;
      --text-primary: #e8e8e8;
      --text-secondary: #9a9a9a;
      --text-tertiary: #555;
      --font-mono: "SF Mono", "Fira Code", "Roboto Mono", monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
    }
    .container { width: 100%; max-width: 640px; }
    .back { color: var(--text-tertiary); text-decoration: none; font-size: 0.75rem; display: inline-block; margin-bottom: 2rem; border-radius: 4px; }
    .back:hover { color: var(--text-secondary); }
    .back:focus-visible { outline: 1px solid var(--text-secondary); outline-offset: 2px; color: var(--text-primary); }
    .title { color: var(--text-primary); font-size: 1.9rem; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
    .subtitle { font-size: 0.8rem; color: var(--text-tertiary); margin-bottom: 1.5rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem;
      line-height: 1.7;
      font-size: 0.9rem;
    }
    .footer { margin-top: 2rem; color: var(--text-tertiary); font-size: 0.68rem; }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="https://o5102o.com">← o5102o.com</a>
    <h1 class="title">by o5102o</h1>
    <p class="subtitle">things i've built</p>

    <section class="card">
      아직 공개한 프로젝트는 없습니다.<br>
      준비되는 대로 여기에 업데이트할게요.
    </section>

    <p class="footer">© 2026 o5102o · Seoul, KR</p>
  </main>
</body>
</html>
