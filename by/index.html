  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --dim: #3a3a3a;
      --mid: #5a5a5a;
      --sub: #8f8f8f;
      --line: #141414;
      --panel: #0f0f0f;

      --font-display: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-body: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-ui: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.5rem;
      --space-6: 2rem;
      --radius-sm: 6px;
      --radius-md: 10px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f7f7;
        --fg: #111111;
        --dim: #8a8a8a;
        --mid: #636363;
        --sub: #464646;
        --line: #e7e7e7;
        --panel: #efefef;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { color-scheme: dark light; }
    body {
      background: var(--bg);
      color: var(--sub);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-6) var(--space-4);
      -webkit-font-smoothing: antialiased;
    }
    .container { width: 100%; max-width: 680px; }
    .back {
      font-family: var(--font-ui);
      color: var(--mid);
      text-decoration: none;
      font-size: 0.75rem;
      display: inline-block;
      margin-bottom: var(--space-6);
      border-radius: var(--radius-sm);
    }
    .back:hover { color: var(--sub); }
    .back:focus-visible { outline: 1px solid var(--sub); outline-offset: 2px; color: var(--fg); }
    .title {
      font-family: var(--font-display);
      color: var(--fg);
      font-size: clamp(1.8rem, 6vw, 2.2rem);
      margin-bottom: var(--space-2);
      letter-spacing: -0.02em;
    }
    .subtitle {
      font-family: var(--font-ui);
      font-size: 0.76rem;
      color: var(--mid);
      margin-bottom: var(--space-5);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      line-height: 1.85;
      font-size: 0.98rem;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .card:hover {
      border-color: var(--dim);
      transform: translateY(-1px);
    }
    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      margin-top: var(--space-3);
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--fg);
      text-decoration: none;
      font-family: var(--font-ui);
      font-size: 0.76rem;
      text-underline-offset: 2px;
    }
    .social-link:hover { background: var(--bg); color: var(--fg); }
    .social-link:focus-visible { outline: 1px solid var(--sub); outline-offset: 2px; }
    .footer {
      margin-top: var(--space-6);
      color: var(--mid);
      font-family: var(--font-ui);
      font-size: 0.66rem;
      letter-spacing: 0.08em;
    }

    @media (max-width: 600px) {
      .card {
        padding: var(--space-4);
        font-size: 0.94rem;
      }
      .subtitle {
        margin-bottom: var(--space-4);
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <a class="back" href="https://o5102o.com">← o5102o.com</a>
    <h1 class="title">by o5102o</h1>
    <p class="subtitle">things i've built</p>

    <section class="card">
      아직 공개한 프로젝트는 없습니다.<br>
      준비되는 대로 여기에 업데이트할게요.<br>

    </section>

    <p class="footer">© 2026 o5102o · Seoul, KR</p>
  </main>
</body>
</html>
