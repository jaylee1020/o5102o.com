<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="o5102o card">
  <meta name="theme-color" content="#0a0a0a">
  <meta property="og:title" content="o5102o / card">
  <meta property="og:description" content="developer card + contact">
  <meta property="og:type" content="profile">
  <meta property="og:url" content="https://card.o5102o.com">
  <title>o5102o / card</title>
  <style>
    :root{--bg:#0a0a0a;--card:#0f0f0f;--fg:#e8e8e8;--mid:#8a8a8a;--line:#1d1d1d;--mono:"SF Mono","Fira Code","Roboto Mono",monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--fg);font-family:var(--mono);padding:2rem;display:flex;justify-content:center}
    .wrap{width:100%;max-width:420px;display:grid;gap:1rem}
    .box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1.25rem}
    h1{font-size:1.7rem;letter-spacing:-.04em}
    .sub{color:var(--mid);font-size:.78rem;margin-top:.4rem}
    ul{list-style:none;margin-top:.8rem}
    li a{display:flex;justify-content:space-between;padding:.7rem 0;border-top:1px solid var(--line);text-decoration:none;color:var(--fg);font-size:.82rem}
    label{font-size:.72rem;color:var(--mid);display:block;margin:.7rem 0 .35rem}
    input{width:100%;background:#111;border:1px solid #222;color:var(--fg);padding:.7rem;border-radius:8px}
    button{margin-top:.9rem;width:100%;padding:.78rem;border:0;border-radius:8px;background:#d9d9d9;color:#111;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="box">
      <h1>o5102o</h1>
      <p class="sub">이주영 (Jay) · 컴퓨터공학부 2학년</p>
      <ul>
        <li><a href="https://o5102o.com"><span>web</span><span>o5102o.com</span></a></li>
        <li><a href="https://by.o5102o.com"><span>portfolio</span><span>by.o5102o.com</span></a></li>
        <li><a href="https://github.com/jaylee1020" target="_blank" rel="noopener noreferrer"><span>github</span><span>@jaylee1020</span></a></li>
        <li><a href="mailto:jyounglee1020@gmail.com"><span>email</span><span>jyounglee1020@gmail.com</span></a></li>
        <li><a href="https://www.instagram.com/o5102o" target="_blank" rel="noopener noreferrer"><span>instagram</span><span>@o5102o</span></a></li>
      </ul>
    </section>

    <section class="box">
      <h1 style="font-size:1.05rem;letter-spacing:0">연락처 남기기</h1>
      <label for="name">이름</label>
      <input id="name" placeholder="홍길동" />
      <label for="phone">연락처</label>
      <input id="phone" placeholder="010-0000-0000" />
      <label for="place">만난 장소(선택)</label>
      <input id="place" placeholder="예: 해커톤" />
      <button onclick="sendMail()">보내기</button>
    </section>
  </main>

  <script>
    function sendMail(){
      const name=document.getElementById('name').value.trim();
      const phone=document.getElementById('phone').value.trim();
      const place=document.getElementById('place').value.trim();
      if(!name||!phone){alert('이름/연락처를 입력해줘요.');return;}
      const body=`이름: ${name}%0A연락처: ${phone}%0A장소: ${place||'-'}`;
      window.location.href=`mailto:jyounglee1020@gmail.com?subject=card contact&body=${body}`;
    }
  </script>
</body>
</html>
