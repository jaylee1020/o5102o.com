<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="o5102o card">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f7f7f7" media="(prefers-color-scheme: light)">
  <meta name="color-scheme" content="dark light">
  <link rel="manifest" href="/manifest.json">
  <link rel="canonical" href="https://card.o5102o.com">
  <meta property="og:title" content="o5102o / card">
  <meta property="og:description" content="developer card + contact">
  <meta property="og:type" content="profile">
  <meta property="og:url" content="https://card.o5102o.com">
  <meta property="og:site_name" content="o5102o">
  <meta property="og:locale" content="ko_KR">
  <meta property="og:image" content="https://o5102o.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="o5102o / card">
  <meta name="twitter:description" content="developer card + contact">
  <meta name="twitter:image" content="https://o5102o.com/og-image.png">
  <title>o5102o / card</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e8e8e8;
      --dim: #3a3a3a;
      --mid: #5a5a5a;
      --sub: #8f8f8f;
      --line: #141414;
      --panel: #0f0f0f;
      --input-bg: #111;
      --btn-bg: #d9d9d9;
      --btn-fg: #111;
      --select-bg: #1e1e1e;
      --placeholder: #6f6f6f;

      --font-display: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-body: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-ui: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;

      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.5rem;
      --space-6: 2rem;
      --radius-sm: 6px;
      --radius-md: 12px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f7f7;
        --fg: #111111;
        --dim: #8a8a8a;
        --mid: #636363;
        --sub: #464646;
        --line: #e7e7e7;
        --panel: #efefef;
        --input-bg: #ffffff;
        --btn-bg: #111111;
        --btn-fg: #f7f7f7;
        --select-bg: #dcdcdc;
        --placeholder: #8f8f8f;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark light; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      padding: var(--space-6);
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { width: 100%; max-width: 460px; display: grid; gap: var(--space-4); }

    .box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--space-5);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 6vw, 2.2rem);
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .sub {
      color: var(--sub);
      font-family: var(--font-ui);
      font-size: 0.75rem;
      margin-top: var(--space-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .profile-box {
      padding: calc(var(--space-4) + 0.1rem) var(--space-4);
    }

    .profile-box h1 {
      font-size: clamp(1.45rem, 5.8vw, 1.75rem);
      letter-spacing: -0.02em;
    }

    .profile-box .sub {
      margin-top: 0.35rem;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
    }

    .profile-box ul {
      margin-top: var(--space-2);
      display: grid;
      gap: 0.15rem;
    }

    .profile-box li a {
      padding: 0.5rem 0.28rem;
      font-size: 0.74rem;
    }

    .form-title {
      font-family: var(--font-ui);
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    ul { list-style: none; margin-top: var(--space-3); }

    li a {
      display: flex;
      justify-content: space-between;
      padding: var(--space-3) 0;
      text-decoration: none;
      color: var(--fg);
      font-family: var(--font-ui);
      font-size: 0.78rem;
      border-radius: var(--radius-sm);
      transition: background 0.15s ease;
    }


    li a:hover {
      background: var(--bg);
    }

    li a:focus-visible {
      outline: 1px solid var(--sub);
      outline-offset: 2px;
      background: var(--bg);
    }

    label {
      font-family: var(--font-ui);
      font-size: 0.68rem;
      color: var(--sub);
      display: block;
      margin: var(--space-3) 0 0.35rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--line);
      color: var(--fg);
      padding: 0.72rem;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.92rem;
    }

    input:focus { outline: none; border-color: var(--dim); }

    input::placeholder { color: var(--placeholder); }

    input.invalid { border-color: #5e2a2a; }

    .hint {
      margin-top: 0.35rem;
      color: var(--mid);
      font-family: var(--font-ui);
      font-size: 0.64rem;
      letter-spacing: 0.05em;
    }

    .msg { margin-top: var(--space-3); font-size: 0.72rem; min-height: 1.1em; }
    .msg.error { color: #d08a8a; }
    .msg.ok { color: #9acb9a; }

    button {
      margin-top: var(--space-4);
      width: 100%;
      padding: 0.78rem;
      border: 0;
      border-radius: var(--radius-sm);
      background: var(--btn-bg);
      color: var(--btn-fg);
      font-family: var(--font-ui);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.15s ease;
    }

    button:active { transform: translateY(1px); }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    button:focus-visible { outline: 1px solid var(--dim); outline-offset: 2px; }

    @media (max-width: 420px) {
      body { padding: var(--space-4); }
      .box { padding: var(--space-4); border-radius: var(--radius-md); }
      .profile-box { padding: 0.9rem; }
      .profile-box .sub { font-size: 0.64rem; }
      .profile-box li a { padding: 0.52rem 0; font-size: 0.72rem; }
      h1 { font-size: 1.75rem; }
      li a { font-size: 0.74rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }

    ::selection {
      background: var(--select-bg);
      color: var(--fg);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="box profile-box">
      <h1>o5102o</h1>
      <p class="sub">이주영 (Jay) · 컴퓨터공학부</p>
      <ul>
        <li><a href="https://o5102o.com"><span>web</span><span>o5102o.com</span></a></li>
        <li><a href="https://by.o5102o.com"><span>portfolio</span><span>by.o5102o.com</span></a></li>
        <li><a href="https://github.com/jaylee1020" target="_blank" rel="noopener noreferrer"><span>github</span><span>@jaylee1020</span></a></li>
        <li><a href="mailto:jyounglee1020@gmail.com"><span>email</span><span>jyounglee1020@gmail.com</span></a></li>
        <li><a href="https://www.instagram.com/o5102o" target="_blank" rel="noopener noreferrer"><span>instagram</span><span>@o5102o</span></a></li>
      </ul>
    </section>

    <section class="box">
      <h1 class="form-title">연락처 남기기</h1>
      <form id="contactForm" aria-busy="false">
        <label for="name">이름 *</label>
        <input id="name" name="name" placeholder="홍길동" autocomplete="name" required aria-describedby="hint" aria-invalid="false" />

        <label for="phone">전화번호 (선택)</label>
        <input id="phone" name="phone" type="tel" placeholder="010-0000-0000" inputmode="tel" autocomplete="tel" aria-invalid="false" />

        <label for="place">만난 곳 (선택)</label>
        <input id="place" name="place" placeholder="예: 해커톤" autocomplete="off" />

        <p id="hint" class="hint">* API 연결 시 자동 저장, 미연결 시 이메일 전송으로 전환됩니다.</p>
        <p id="message" class="msg" role="status" aria-live="polite"></p>
        <button id="submitButton" type="submit">보내기</button>
      </form>
    </section>
  </main>

  <script>
    const contactForm = document.getElementById('contactForm');
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');
    const placeInput = document.getElementById('place');
    const messageEl = document.getElementById('message');
    const submitButton = document.getElementById('submitButton');

    let isSubmitting = false;

    // API mode:
    // - Set CONTACT_API_URL to your endpoint (POST JSON)
    // - Optional CONTACT_API_KEY for Bearer auth
    // - If unset/failure, mailto fallback opens
    const CONTACT_API_URL = window.CONTACT_API_URL || '';
    const CONTACT_API_KEY = window.CONTACT_API_KEY || '';

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.className = `msg${type ? ` ${type}` : ''}`;
    }

    function clearFieldError(field) {
      field.classList.remove('invalid');
      field.setAttribute('aria-invalid', 'false');
    }

    function setSubmitting(next) {
      isSubmitting = next;
      submitButton.disabled = next;
      submitButton.textContent = next ? '저장 중...' : '보내기';
      contactForm.setAttribute('aria-busy', next ? 'true' : 'false');
    }

    function getPayload() {
      return {
        name: nameInput.value.trim(),
        phone: phoneInput.value.trim() || null,
        place: placeInput.value.trim() || null,
        source: 'card.o5102o.com',
        createdAt: new Date().toISOString()
      };
    }

    function buildMailtoFallback(payload) {
      const subject = encodeURIComponent(`[card.o5102o.com] ${payload.name}님의 연락처`);
      const body = encodeURIComponent(
        `이름: ${payload.name}\n` +
        `전화번호: ${payload.phone || '미입력'}\n` +
        `만난 곳: ${payload.place || '미입력'}\n` +
        `시간: ${payload.createdAt}`
      );
      return `mailto:jyounglee1020@gmail.com?subject=${subject}&body=${body}`;
    }

    async function saveToDatabase(payload) {
      if (!CONTACT_API_URL) {
        const mailtoLink = buildMailtoFallback(payload);
        window.location.href = mailtoLink;
        return { ok: true, fallback: 'mailto' };
      }

      const headers = {
        'Content-Type': 'application/json'
      };

      if (CONTACT_API_KEY) {
        headers['Authorization'] = `Bearer ${CONTACT_API_KEY}`;
      }

      const response = await fetch(CONTACT_API_URL, {
        method: 'POST',
        headers,
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const text = await response.text().catch(() => '');
        throw new Error(text || `HTTP ${response.status}`);
      }

      return { ok: true };
    }


    nameInput.addEventListener('input', () => {
      clearFieldError(nameInput);
      setMessage('');
    });

    phoneInput.addEventListener('input', () => {
      clearFieldError(phoneInput);
      setMessage('');
    });

    contactForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (isSubmitting) return;

      const payload = getPayload();

      if (!payload.name) {
        nameInput.classList.add('invalid');
        nameInput.setAttribute('aria-invalid', 'true');
        setMessage('이름을 입력해 주세요.', 'error');
        nameInput.focus();
        return;
      }

      if (payload.phone) {
        const digits = payload.phone.replace(/[\s\-()]/g, '');
        const isValid = /^(01[016789]\d{7,8}|0[2-6][1-9]\d{6,7}|\+82\d{9,10})$/.test(digits);
        if (!isValid) {
          phoneInput.classList.add('invalid');
          phoneInput.setAttribute('aria-invalid', 'true');
          setMessage('올바른 전화번호를 입력해 주세요. (예: 010-1234-5678)', 'error');
          phoneInput.focus();
          return;
        }
      }

      try {
        setSubmitting(true);
        setMessage('저장 중...', 'ok');
        const result = await saveToDatabase(payload);
        if (result.fallback === 'mailto') {
          setMessage('이메일 앱이 열립니다. 전송해 주세요!', 'ok');
        } else {
          setMessage('저장 완료. 감사합니다!', 'ok');
        }
        contactForm.reset();
      } catch (error) {
        console.error(error);
        const mailtoLink = buildMailtoFallback(payload);
        const linkEl = document.createElement('a');
        linkEl.href = mailtoLink;
        linkEl.textContent = '이메일로 보내기';
        linkEl.style.cssText = 'color:#9acb9a;text-decoration:underline';
        messageEl.textContent = '';
        messageEl.append('저장 실패. ', linkEl);
        messageEl.className = 'msg error';
      } finally {
        setSubmitting(false);
      }
    });
  </script>
</body>
</html>
