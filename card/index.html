<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="o5102o card">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="canonical" href="https://card.o5102o.com">
  <meta property="og:title" content="o5102o / card">
  <meta property="og:description" content="developer card + contact">
  <meta property="og:type" content="profile">
  <meta property="og:url" content="https://card.o5102o.com">
  <meta property="og:site_name" content="o5102o">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="o5102o / card">
  <meta name="twitter:description" content="developer card + contact">
  <title>o5102o / card</title>
  <style>
    :root{--bg:#0a0a0a;--card:#0f0f0f;--fg:#e8e8e8;--mid:#8a8a8a;--line:#1d1d1d;--mono:"SF Mono","Fira Code","Roboto Mono",monospace}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--fg);font-family:var(--mono);padding:2rem;display:flex;justify-content:center}
    .wrap{width:100%;max-width:420px;display:grid;gap:1rem}
    .box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1.25rem}
    h1{font-size:1.7rem;letter-spacing:-.04em}
    .sub{color:var(--mid);font-size:.78rem;margin-top:.4rem}
    ul{list-style:none;margin-top:.8rem}
    li a{display:flex;justify-content:space-between;padding:.7rem 0;border-top:1px solid var(--line);text-decoration:none;color:var(--fg);font-size:.82rem;border-radius:6px}
    li a:focus-visible{outline:1px solid #4a4a4a;outline-offset:2px;background:#121212}
    label{font-size:.72rem;color:var(--mid);display:block;margin:.7rem 0 .35rem}
    input{width:100%;background:#111;border:1px solid #222;color:var(--fg);padding:.7rem;border-radius:8px}
    input:focus{outline:none;border-color:#3b3b3b}
    input.invalid{border-color:#5e2a2a}
    .hint{margin-top:.35rem;color:#777;font-size:.68rem}
    .msg{margin-top:.7rem;font-size:.72rem;min-height:1.1em}
    .msg.error{color:#d08a8a}
    .msg.ok{color:#9acb9a}
    button{margin-top:.9rem;width:100%;padding:.78rem;border:0;border-radius:8px;background:#d9d9d9;color:#111;font-weight:700;cursor:pointer}
    button:focus-visible{outline:1px solid #bdbdbd;outline-offset:2px}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="box">
      <h1>o5102o</h1>
      <p class="sub">이주영 (Jay) · 컴퓨터공학부 2학년</p>
      <ul>
        <li><a href="https://o5102o.com"><span>web</span><span>o5102o.com</span></a></li>
        <li><a href="https://by.o5102o.com"><span>portfolio</span><span>by.o5102o.com</span></a></li>
        <li><a href="https://github.com/jaylee1020" target="_blank" rel="noopener noreferrer"><span>github</span><span>@jaylee1020</span></a></li>
        <li><a href="mailto:jyounglee1020@gmail.com"><span>email</span><span>jyounglee1020@gmail.com</span></a></li>
        <li><a href="https://www.instagram.com/o5102o" target="_blank" rel="noopener noreferrer"><span>instagram</span><span>@o5102o</span></a></li>
      </ul>
    </section>

    <section class="box">
      <h1 style="font-size:1.05rem;letter-spacing:0">연락처 남기기</h1>
      <form id="contactForm">
        <label for="name">이름 *</label>
        <input id="name" name="name" placeholder="홍길동" autocomplete="name" required aria-describedby="hint" />

        <label for="phone">전화번호 (선택)</label>
        <input id="phone" name="phone" type="tel" placeholder="010-0000-0000" inputmode="tel" autocomplete="tel" />

        <label for="place">만난 곳 (선택)</label>
        <input id="place" name="place" placeholder="예: 해커톤" autocomplete="off" />

        <p id="hint" class="hint">* 제출하면 DB에 자동 저장됩니다.</p>
        <p id="message" class="msg" aria-live="polite"></p>
        <button type="submit">보내기</button>
      </form>
    </section>
  </main>

  <script>
    const contactForm = document.getElementById('contactForm');
    const nameInput = document.getElementById('name');
    const phoneInput = document.getElementById('phone');
    const placeInput = document.getElementById('place');
    const messageEl = document.getElementById('message');

    // Required DB API mode:
    // - Set CONTACT_API_URL to your endpoint (POST JSON)
    // - Optional CONTACT_API_KEY for Bearer auth
    // If unset, submission is blocked (no mail fallback)
    const CONTACT_API_URL = window.CONTACT_API_URL || '';
    const CONTACT_API_KEY = window.CONTACT_API_KEY || '';

    function setMessage(text, type) {
      messageEl.textContent = text || '';
      messageEl.className = `msg${type ? ` ${type}` : ''}`;
    }

    function clearFieldError(field) {
      field.classList.remove('invalid');
    }

    function getPayload() {
      return {
        name: nameInput.value.trim(),
        phone: phoneInput.value.trim() || null,
        place: placeInput.value.trim() || null,
        source: 'card.o5102o.com',
        createdAt: new Date().toISOString()
      };
    }

    async function saveToDatabase(payload) {
      if (!CONTACT_API_URL) {
        throw new Error('CONTACT_API_URL is not configured');
      }

      const headers = {
        'Content-Type': 'application/json'
      };

      if (CONTACT_API_KEY) {
        headers['Authorization'] = `Bearer ${CONTACT_API_KEY}`;
      }

      const response = await fetch(CONTACT_API_URL, {
        method: 'POST',
        headers,
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const text = await response.text().catch(() => '');
        throw new Error(text || `HTTP ${response.status}`);
      }

      return { ok: true };
    }


    nameInput.addEventListener('input', () => {
      clearFieldError(nameInput);
      setMessage('');
    });

    phoneInput.addEventListener('input', () => {
      clearFieldError(phoneInput);
      setMessage('');
    });

    contactForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const payload = getPayload();

      if (!payload.name) {
        nameInput.classList.add('invalid');
        setMessage('이름을 입력해 주세요.', 'error');
        nameInput.focus();
        return;
      }

      if (payload.phone && !/^[0-9+\-\s()]{7,20}$/.test(payload.phone)) {
        phoneInput.classList.add('invalid');
        setMessage('전화번호 형식을 확인해 주세요. (숫자, +, -, 공백 가능)', 'error');
        phoneInput.focus();
        return;
      }

      try {
        setMessage('저장 중...', 'ok');
        await saveToDatabase(payload);
        setMessage('저장 완료. 감사합니다!', 'ok');
        contactForm.reset();
      } catch (error) {
        console.error(error);
        setMessage('저장 실패: 관리자 DB 연결 설정을 확인해 주세요.', 'error');
      }
    });
  </script>
</body>
</html>
